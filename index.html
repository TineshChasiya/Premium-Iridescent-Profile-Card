<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Premium Iridescent Profile Card</title>
        <!-- Font family - Inter -->
         <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
         <!-- External CSS -->
          <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="hero-container">    
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <article class="profile-card">      
                <div class="profile-avatar">
                    <img src="profile-img.png" alt="Profile Picture">
                </div>
                <div class="profile-info">
                    <span class="badge">Senior UI Architect</span>
                    <h1>Aria Vance</h1>
                    <p>Bridging the gap between static transparency and dynamic depth with modern CSS layouts.</p>
                </div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <strong>48 Premium</strong>
                        <span>Projects Complete</span>
                    </div>
                    <div class="stat-item">
                        <strong>14.2k</strong>
                        <span>Global Followers</span>
                    </div>
                </div>
            </article>
        </div>
    </body>
    </html>
